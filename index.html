<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pico W LED 밝기 조절</title>

  <!-- MQTT.js -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f5f5f5;
    }

    .container {
      background: white;
      width: 350px;
      margin: auto;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 30px;
    }

    .slider {
      width: 100%;
    }

    .value {
      font-size: 30px;
      margin-top: 20px;
      font-weight: bold;
      color: #2e7d32;
    }

    .status {
      margin-top: 20px;
      color: gray;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>LED 밝기 조절</h1>

  <input
    type="range"
    min="0"
    max="100"
    value="0"
    class="slider"
    id="brightnessSlider"
  >

  <div class="value" id="brightnessValue">0%</div>

  <div class="status" id="status">
    MQTT 연결 중...
  </div>
</div>

<script>
  // MQTT 연결
  const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

  const slider = document.getElementById('brightnessSlider');
  const valueText = document.getElementById('brightnessValue');
  const statusText = document.getElementById('status');

  // 연결 성공
  client.on('connect', () => {
    console.log('MQTT 연결 완료');
    statusText.innerText = 'MQTT 연결 완료';
  });

  // 슬라이더 값 변경 시
  slider.addEventListener('input', () => {

    const value = slider.value;

    // 화면 표시
    valueText.innerText = value + '%';

    // MQTT 전송
    client.publish('pico/led', value);

    console.log('전송:', value);
  });
</script>

</body>
</html>
